# Deploy frontend (Existential Detective chat) to Azure Static Web Apps
# When you create the Static Web App in Azure and connect this repo, Azure will
# add the deployment token as a secret. Use that secret name in the workflow
# (e.g. AZURE_STATIC_WEB_APPS_API_TOKEN_<your-app-name>).

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Set this secret in GitHub after creating the Static Web App in Azure:
          # Settings > Secrets and variables > Actions > New repository secret
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          # Static content: frontend/public (no build step)
          app_location: "frontend/public"
          output_location: ""
          skip_app_build: true
          # API: Azure Functions in frontend/api
          api_location: "frontend/api"
          production_branch: "main"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
